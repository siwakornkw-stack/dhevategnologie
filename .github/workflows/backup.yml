name: Daily Backup

on:
  schedule:
    # 20:00 UTC = 03:00 Asia/Bangkok
    - cron: '0 20 * * *'
  workflow_dispatch: {}

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger backup endpoint
        env:
          BACKUP_URL: ${{ secrets.BACKUP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$BACKUP_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "Missing BACKUP_URL or CRON_SECRET secret"
            exit 1
          fi
          response=$(curl -sS -w "\n%{http_code}" -X GET "$BACKUP_URL" \
            -H "Authorization: Bearer $CRON_SECRET" \
            --max-time 290)
          body=$(echo "$response" | sed '$d')
          status=$(echo "$response" | tail -n1)
          echo "Status: $status"
          echo "Body: $body"
          if [ "$status" != "200" ]; then
            exit 1
          fi
